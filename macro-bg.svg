<!-- Euler -->
<text x="600" y="818" class="eq" font-size="11" font-style="italic">E_t[sum b^t u(C_t, 1-N_t)]</text>

<!-- NK Phillips bas -->
<text x="798" y="798" class="eq-t" font-size="11">New Keynesian Phillips Curve</text>
<text x="810" y="818" class="eq" font-size="12" font-style="italic">pi_t = bE_t pi_{t+1} + kx_t</text>

<!-- Cobb-Douglas -->
<text x="560" y="860" class="eq" font-size="12" font-style="italic">Y = A * K^a * L^(1-a)</text>

<!-- UIP et Fisher -->
<text x="870" y="760" class="eq" font-size="11" font-style="italic">i - i* = E_t[De_{t+1}]</text>
<text x="870" y="780" class="eq" font-size="11" font-style="italic">(1+i) = (1+r)(1+pi^e)</text>

