<svg width="100%" viewBox="0 0 1400 900" role="img" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    .eq { font-family: Georgia, serif; fill: #0b3c6f; opacity: 0.13; }
    .eq-sm { font-size: 13px; }
    .eq-md { font-size: 16px; }
    .eq-lg { font-size: 19px; }
    .curve { fill: none; stroke: #0b3c6f; stroke-width: 1.4; opacity: 0.09; }
    .curve2 { fill: none; stroke: #2a6fa1; stroke-width: 1.2; opacity: 0.08; }
    .axis { stroke: #0b3c6f; stroke-width: 0.8; opacity: 0.07; }
    .axislabel { font-family: Georgia, serif; fill: #0b3c6f; opacity: 0.1; font-size: 11px; }
    .dot { fill: #0b3c6f; opacity: 0.08; }
    .icon-stroke { stroke: #0b3c6f; stroke-width: 1.2; fill: none; opacity: 0.09; }
    .icon-fill { fill: #0b3c6f; opacity: 0.07; }
  </style>
</defs>

<!-- IS-LM haut-gauche -->
<g transform="translate(60, 50)">
  <line x1="0" y1="180" x2="220" y2="180" class="axis"/>
  <line x1="0" y1="0" x2="0" y2="185" class="axis"/>
  <text x="222" y="184" class="axislabel">Y</text>
  <text x="-12" y="8" class="axislabel">r</text>
  <path d="M10 20 Q80 80 210 160" class="curve"/>
  <path d="M10 155 Q100 100 210 30" class="curve2"/>
  <text x="215" y="155" class="axislabel">IS</text>
  <text x="215" y="28" class="axislabel">LM</text>
  <circle cx="110" cy="92" r="3.5" class="dot"/>
  <line x1="110" y1="92" x2="110" y2="180" stroke="#0b3c6f" stroke-width="0.7" stroke-dasharray="4,3" opacity="0.07"/>
  <line x1="0" y1="92" x2="110" y2="92" stroke="#0b3c6f" stroke-width="0.7" stroke-dasharray="4,3" opacity="0.07"/>
</g>

<!-- AD-AS centre-haut -->
<g transform="translate(420, 30)">
  <line x1="0" y1="200" x2="240" y2="200" class="axis"/>
  <line x1="0" y1="0" x2="0" y2="205" class="axis"/>
  <text x="242" y="204" class="axislabel">Y</text>
  <text x="-10" y="8" class="axislabel">P</text>
  <path d="M15 25 Q90 100 225 185" class="curve"/>
  <path d="M20 175 Q100 110 220 40" class="curve2"/>
  <line x1="130" y1="5" x2="130" y2="200" stroke="#0b3c6f" stroke-width="1" stroke-dasharray="5,4" opacity="0.08"/>
  <text x="133" y="12" class="axislabel">LRAS</text>
  <text x="228" y="185" class="axislabel">AD</text>
  <text x="222" y="38" class="axislabel">SRAS</text>
</g>

<!-- Courbe de Phillips haut-droite -->
<g transform="translate(900, 40)">
  <line x1="0" y1="190" x2="210" y2="190" class="axis"/>
  <line x1="0" y1="0" x2="0" y2="195" class="axis"/>
  <text x="212" y="194" class="axislabel">u</text>
  <text x="-10" y="8" class="axislabel">π</text>
  <path d="M15 15 Q40 70 80 115 Q130 155 200 175" class="curve"/>
  <path d="M15 45 Q45 95 85 140 Q135 175 200 195" class="curve2"/>
  <text x="160" y="165" class="axislabel">PC</text>
  <text x="160" y="193" class="axislabel">E[PC]</text>
</g>

<!-- Mundell-Fleming bas-gauche -->
<g transform="translate(50, 560)">
  <line x1="0" y1="200" x2="220" y2="200" class="axis"/>
  <line x1="0" y1="0" x2="0" y2="205" class="axis"/>
  <text x="222" y="204" class="axislabel">Y</text>
  <text x="-10" y="8" class="axislabel">e</text>
  <path d="M10 170 Q100 100 210 35" class="curve"/>
  <path d="M12 25 Q90 95 208 178" class="curve2"/>
  <text x="212" y="32" class="axislabel">BP=0</text>
  <text x="210" y="180" class="axislabel">IS*</text>
</g>

<!-- Solow Growth bas-centre -->
<g transform="translate(400, 550)">
  <line x1="0" y1="210" x2="250" y2="210" class="axis"/>
  <line x1="0" y1="0" x2="0" y2="215" class="axis"/>
  <text x="252" y="214" class="axislabel">k</text>
  <text x="-12" y="8" class="axislabel">y</text>
  <path d="M5 205 Q60 120 130 80 Q190 55 245 45" class="curve"/>
  <path d="M0 210 L245 60" class="curve2"/>
  <line x1="160" y1="55" x2="160" y2="210" stroke="#0b3c6f" stroke-width="0.7" stroke-dasharray="4,3" opacity="0.07"/>
  <text x="162" y="207" class="axislabel">k*</text>
  <text x="238" y="43" class="axislabel">sf(k)</text>
  <text x="238" y="62" class="axislabel">(n+δ)k</text>
</g>

<!-- Taylor Rule bas-droite -->
<g transform="translate(900, 560)">
  <line x1="0" y1="200" x2="220" y2="200" class="axis"/>
  <line x1="0" y1="0" x2="0" y2="205" class="axis"/>
  <text x="222" y="204" class="axislabel">π</text>
  <text x="-8" y="8" class="axislabel">i</text>
  <line x1="0" y1="200" x2="200" y2="0" stroke="#0b3c6f" stroke-width="0.9" stroke-dasharray="6,4" opacity="0.07"/>
  <path d="M5 185 Q80 120 180 30" class="curve"/>
  <text x="183" y="27" class="axislabel">TR</text>
</g>

<!-- Graphique boursier droite -->
<g transform="translate(1250, 330)" opacity="0.08">
  <line x1="0" y1="100" x2="120" y2="100" class="axis"/>
  <line x1="0" y1="0" x2="0" y2="103" class="axis"/>
  <polyline points="5,80 20,65 35,70 50,45 65,50 80,30 95,35 115,15" class="curve" style="opacity:0.12"/>
  <circle cx="115" cy="15" r="3" class="dot"/>
</g>

<!-- ÉQUATIONS DISPERSÉES -->
<text x="310" y="260" class="eq eq-lg" transform="rotate(-3, 310, 260)">π_t = βE_t[π_{t+1}] + κx_t</text>
<text x="720" y="195" class="eq eq-md" transform="rotate(2, 720, 195)">i_t = r* + π* + φ_π(π_t − π*) + φ_y ỹ_t</text>
<text x="1080" y="290" class="eq eq-md" transform="rotate(-1.5, 1080, 290)">(1 + i) = (1 + r)(1 + πᵉ)</text>
<text x="130" y="420" class="eq eq-lg" transform="rotate(1, 130, 420)">MV = PY</text>
<text x="400" y="490" class="eq eq-md" transform="rotate(-2, 400, 490)">Y = A · K^α · L^{1−α}</text>
<text x="780" y="430" class="eq eq-md" transform="rotate(1.5, 780, 430)">C_t^{−σ} = β(1 + r_{t+1}) C_{t+1}^{−σ}</text>
<text x="1100" y="470" class="eq eq-sm" transform="rotate(-2, 1100, 470)">i − i* = E[Δe_{t+1}]</text>
<text x="55" y="310" class="eq eq-sm" transform="rotate(2, 55, 310)">W/P = MRS(C, L)</text>
<text x="640" y="330" class="eq eq-md" transform="rotate(-1, 640, 330)">b_{t+1} = (1+r)b_t − s_t</text>
<text x="1170" y="380" class="eq eq-sm" transform="rotate(2, 1170, 380)">ċ/c = (r − ρ)/σ</text>
<text x="320" y="390" class="eq eq-sm" transform="rotate(-1.5, 320, 390)">CA + KA = 0</text>
<text x="920" y="310" class="eq eq-sm" transform="rotate(1, 920, 310)">M/P = L(i, Y)</text>
<text x="100" y="510" class="eq eq-sm" transform="rotate(-2, 100, 510)">x_t = E_t[x_{t+1}] − σ(i_t − E_t[π_{t+1}] − r*)</text>
<text x="1050" y="540" class="eq eq-sm" transform="rotate(1.5, 1050, 540)">Optimal Currency Area</text>
<text x="500" y="860" class="eq eq-sm" transform="rotate(-1, 500, 860)">L = (π − π*)² + λ(y − y*)²</text>
<text x="800" y="820" class="eq eq-sm" transform="rotate(2, 800, 820)">H = U(c,t) + λ f(k,c)</text>
<text x="200" y="780" class="eq eq-md" transform="rotate(-1.5, 200, 780)">Y ≡ C + I + G + NX</text>
<text x="1100" y="750" class="eq eq-sm" transform="rotate(1, 1100, 750)">r = i − πᵉ</text>
<text x="1200" y="145" class="eq eq-sm" transform="rotate(-2, 1200, 145)">P = MC · μ</text>
<text x="680" y="840" class="eq eq-sm" transform="rotate(-1, 680, 840)">ẏ/y = A − δ − n</text>

<!-- ICÔNES BANQUE CENTRALE -->

