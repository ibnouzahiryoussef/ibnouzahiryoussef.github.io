  <line x1="0" y1="115" x2="90" y2="115" stroke="#0b3c6f" stroke-width="2" opacity="0.09"/>
  <line x1="-10" y1="118" x2="100" y2="118" stroke="#0b3c6f" stroke-width="2.5" opacity="0.09"/>
  <text x="17" y="135" class="axislabel" style="font-size:9px;">CENTRAL BANK</text>
</g>

