<text x="1210" y="285" class="eq" font-size="10">Price Stability</text>
<text x="1207" y="299" class="eq" font-size="10">Financial Stability</text>
<text x="1210" y="313" class="eq" font-size="10">Economic Growth</text>

<!-- Money Demand -->
<text x="1092" y="368" class="eq-t" font-size="11">Money Demand</text>
<text x="1098" y="392" class="eq" font-size="16" font-style="italic">M/P = L(i, Y)</text>

<!-- Interest Rate Rule -->
<text x="1088" y="436" class="eq-t" font-size="11">Interest Rate Rule</text>
<text x="1082" y="454" class="eq" font-size="10" font-style="italic">i_t = ri_{t-1} + (1-r)(i + phi_pi*pi_t + phi_y*y_t) + e_t</text>

<!-- Yield Curve -->
<text x="1090" y="490" class="eq-t" font-size="10">Yield Curve</text>
<g transform="translate(1082,498)">
<line x1="0" y1="60" x2="160" y2="60" class="ax"/>
