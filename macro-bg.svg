<!-- DROITE : Taylor Rule -->
<text x="1108" y="28" class="eq-t" font-size="11">Taylor Rule</text>
<text x="1082" y="44" class="eq" font-size="10" font-style="italic">i_t = r* + pi_t + phi_pi(pi_t - pi*) + phi_y(y_t - y*)</text>

<!-- Aggregate Supply -->
<text x="900" y="28" class="eq-t" font-size="11">Aggregate Supply</text>
<text x="920" y="44" class="eq" font-size="12" font-style="italic">Y = F(K, L)</text>

<!-- NK Phillips haut -->
<text x="1082" y="62" class="eq" font-size="10" font-style="italic">pi_t = bE_t pi_{t+1} + kx_t + u_t</text>

<!-- Central Banking icone -->
<text x="1100" y="220" class="eq-t" font-size="11">Central Banking</text>
<g transform="translate(1118,228)" opacity="0.12">
<rect x="0" y="44" width="76" height="56" fill="none" stroke="#1a4e8a" stroke-width="1.1"/>
<rect x="8" y="54" width="13" height="20" fill="none" stroke="#1a4e8a" stroke-width="1"/>
