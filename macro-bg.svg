<text x="212" y="56" class="lbl">(n+d)k</text>
<text x="144" y="182" class="lbl">k*</text>
<text x="216" y="188" class="lbl">k</text>
<text x="-10" y="7" class="lbl">y</text>
</g>

<!-- Equations gauche -->
<text x="18" y="498" class="eq" font-size="13" font-style="italic">MV = PY</text>
<text x="14" y="518" class="eq" font-size="11">Y = C(Y-T) + I(i) + G</text>
<text x="230" y="228" class="eq" font-size="11" font-style="italic">c/c = (r - p)/s</text>
<text x="240" y="248" class="eq" font-size="12" font-style="italic">k = sf(k) - (n+d)k</text>

